<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Application</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <!-- Header -->
            <header class="app-header">
                <h1>📝 My To-Do List</h1>
                <p class="subtitle">Stay organized and productive</p>
            </header>

            <!-- Input Section -->
            <div class="input-section">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="todoInput" 
                        class="todo-input" 
                        placeholder="Add a new task..."
                        autocomplete="off"
                    >
                    <button id="addBtn" class="add-btn">Add Task</button>
                </div>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
            </div>

            <!-- Stats Section -->
            <div class="stats-section">
                <div class="stat">
                    <span class="stat-label">Total Tasks:</span>
                    <span class="stat-value" id="totalTasks">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Completed:</span>
                    <span class="stat-value" id="completedTasks">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Remaining:</span>
                    <span class="stat-value" id="remainingTasks">0</span>
                </div>
            </div>

            <!-- To-Do List -->
            <main class="todo-list" id="todoList">
                <!-- Tasks will be inserted here -->
            </main>

            <!-- Empty State -->
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">✨</div>
                <p>No tasks yet. Add one to get started!</p>
            </div>

            <!-- Action Buttons -->
            <footer class="app-footer">
                <button id="clearBtn" class="clear-btn">Clear Completed</button>
                <button id="deleteAllBtn" class="delete-all-btn">Delete All</button>
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
